<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<style>





body {

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

        0 0 5px rgba(0,247,255,0.7),

    transition: 0.3s;
}

.logo:hover {
    text-shadow:
        0 0 10px #00f7ff,

/* خلفية الكانفاس */
#bg {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    background: radial-gradient(circle, #0f2027, #000);
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #000;
    
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}


nav h2 {
  font-size: 2rem; /* حجم عنوان Zizo & Anas */
}

nav div a {
  font-size: 1.25rem; /* حجم الروابط */
  padding: 0.5rem 1rem; /* مساحة حول كل رابط */
  display: inline-block;
}

/* لو عايز أكبر أو أصغر عدل القيم (rem, px,%) */


nav{
  display: flex;
  align-items: center;   /* توسيط عمودي */
  justify-content: center; /* توسيط أفقي */

}

nav h2{
  margin: 0;
}

nav div{

/* Header */

}

.btn {
    padding: 12px 25px;

    border: none;
}

/* Wheel Section */
#wheel-section {

}

#wheel {

    border: 10px solid #fff;
    margin: 30px auto;

}

.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;

}




#result {
    margin-top: 20px;

}

/* Footer */
footer {
    margin-top: 50px;
    padding: 20px;

</head>
<body>

<!-- الخلفية -->
<canvas id="bg"></canvas>



<nav>
    <h2 class="logo">ZAS</h2>
    <div>
        <a href="index.html">الرئيسية</a>

</nav>

<section>
<h1>أعمالنا السابقة</h1>
<div class="cards">

<div class="card">
    <img src="https://nanusoft.com/wp-content/uploads/2025/02/14d.png" >
    <h3>موقع متجر</h3>

</div>

<div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/11778/11778349.png" alt="مشروع 2">
    <h3>موقع شخصي</h3>

</div>

<div class="card">
    <img src="https://via.placeholder.com/250" alt="مشروع 3">

    <p>Landing Page لمنتج</p>
</div>

</div>
</section>

<footer>
<p>© 2026</p>
</footer>



<script>



// ✨ الخلفية الفخمة
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
        if (p.y > canvas.height || p.y < 0) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 100) {
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});


</script>
</body>
</html>
