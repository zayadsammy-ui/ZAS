<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الخدمة</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        margin: 0;
        overflow: hidden;
    }

    /* الخلفية */
    #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 1;
        pointer-events: none;
    }

    .content {
        position: relative;
        z-index: 1;
        padding: 40px 15px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .box {
        margin-top: 20px;
        background: rgba(0,0,0,0.35);
        padding: 25px 18px;
        border-radius: 12px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
    }

    input, textarea {
        width: 250px;
        max-width: 90vw;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.05);
        color: white;
        outline: none;
    }

    textarea{
        height: 120px;
        resize: none;
    }

    button {
        padding: 10px 20px;
        background: red;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: fit-content;
    }

    h1, h3 { margin: 0 0 15px; }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">
    <h1 id="serviceName"></h1>

    <div class="box">
        <h3>اطلب الآن 📲</h3>

        <input type="text" id="phone" placeholder="رقمك"><br>
        <textarea id="details" placeholder="اكتب تفاصيل طلبك"></textarea><br>

        <button onclick="sendOrder()">إرسال الطلب</button>
    </div>
</div>

<script>
/* -------- Canvas particles background -------- */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
const COUNT = 120;

function initParticles() {
    particles = [];
    for (let i = 0; i < COUNT; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.5
        });
    }
}
initParticles();

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
        if (p.y > canvas.height || p.y < 0) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // خطوط بين النقاط
    for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 100) {
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize", () => {
    resizeCanvas();
    initParticles(); // إعادة توزيع سريعة
});

/* -------- WhatsApp order script -------- */
const params = new URLSearchParams(window.location.search);
const service = params.get("service") || "الخدمة";
document.getElementById("serviceName").innerText = service;

function sendOrder() {
    const phone = document.getElementById("phone").value.trim();
    const details = document.getElementById("details").value.trim();

    if (!phone) return alert("من فضلك اكتب رقمك.");
    if (!details) return alert("من فضلك اكتب تفاصيل طلبك.");

    const message =
        `📌 الخدمة: ${service}\n` +
        `📞 الرقم: ${phone}\n` +
        `📝 التفاصيل: ${details}`;

    const url = `https://wa.me/201014544655?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
}
</script>

</body>
</html>
