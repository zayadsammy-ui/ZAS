<!DOCTYPE html>
<html lang="ar">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Zizo & Anas</title>

<style>





body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
}

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

img {
  max-width: 100%;
  height: auto;
}

.container {
  width: 100%;
  max-width: 600px;
  margin: auto;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: -2px; /* يخلي الحروف لازقة */
    
    background: linear-gradient(45deg, #00f7ff, #0066ff, #9d00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 5px rgba(0,247,255,0.7),
        0 0 10px rgba(0,102,255,0.7),
        0 0 20px rgba(157,0,255,0.7);
    
    transition: 0.3s;
}

.logo:hover {
    text-shadow:
        0 0 10px #00f7ff,
        0 0 20px #0066ff,
        0 0 30px #9d00ff;
}



/* خلفية الكانفاس */
#bg {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    background: radial-gradient(circle, #0f2027, #000);
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #000;
    
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}


nav h2 {
  font-size: 2rem; /* حجم عنوان Zizo & Anas */
}

nav div a {
  font-size: 1.25rem; /* حجم الروابط */
  padding: 0.5rem 1rem; /* مساحة حول كل رابط */
  display: inline-block;
}

/* لو عايز أكبر أو أصغر عدل القيم (rem, px,%) */


nav{
  display: flex;
  align-items: center;   /* توسيط عمودي */
  justify-content: center; /* توسيط أفقي */
  gap: 20px;
}

nav h2{
  margin: 0;
}

nav div{
  display: flex;
  gap: 15px;
  justify-content: center;
}



/* Header */
header {
    padding: 50px;
}

/* Button */
.btn {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
    background: red;
    color: white;
    border: none;
}

/* Wheel Section */
#wheel-section {
    margin-top: 50px;
}

#wheel {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 10px solid #fff;
    margin: 30px auto;
    position: relative;
    overflow: hidden;
}

.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
}

.slice1 { background: gold; transform: rotate(0deg) skewY(-60deg); }
.slice2 { background: red; transform: rotate(120deg) skewY(-60deg); }
.slice3 { background: green; transform: rotate(240deg) skewY(-60deg); }

#spin {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    background: #ff0000;
    border: none;
    color: white;
}

#result {
    margin-top: 20px;
    font-size: 22px;
}

/* Footer */
footer {
    margin-top: 50px;
    padding: 20px;
    background: #000;
}
</style>

</head>
<body>

<!-- الخلفية -->
<canvas id="bg"></canvas>

<nav>
    <h2 class="logo">ZAS</h2>
    <div>
        
        

       

      <a href="index.html">الرئيسية</a>

    </div>
</nav>

<header>
    <h1>خدمات برمجة وتصميم مواقع</h1>
    <p>نحول أفكارك لمواقع حقيقية وجذابة</p>
    <a href="services.html"><button class="btn">شوف الخدمات</button></a>
</header>

<section id="wheel-section">
    <h2>جرب حظك 🎁</h2>

    <div id="wheel">
        <div class="slice slice1"></div>
        <div class="slice slice2"></div>
        <div class="slice slice3"></div>
    </div>

    <button id="spin">لف العجلة</button>
    <div id="result"></div>
</section>

<footer>
    <p> موقعنا مخصص لبرمجة المواقع وتعديلها </p>
    <p>© 2026 Zizo & Anas</p>
</footer>

<script>
// 🎡 عجلة الحظ
const spinBtn = document.getElementById("spin");
const wheel = document.getElementById("wheel");
const result = document.getElementById("result");

const whatsappLink = "https://wa.me/201014544655?text";

if (localStorage.getItem("spun")) {
    spinBtn.disabled = true;
    result.innerText = "❌ انت لفّيت قبل كده!";
}

spinBtn.onclick = () => {

    let rand = Math.random() * 100;
    let prize, degree, code;

    if (rand < 20) {
        prize = "🎁 طلبك ببلاش المره دي";
        code = "FREE2026";
        degree = 360 * 5 + 30;
    } else if (rand < 50) {
        prize = "💸 خصم 50%!";
        code = "ZA50";
        degree = 360 * 5 + 150;
    } else {
        prize = "💰 خصم 30%!";
        code = "AZ30";
        degree = 360 * 5 + 270;
    }

    wheel.style.transition = "transform 4s ease-out";
    wheel.style.transform = "rotate(" + degree + "deg)";

    setTimeout(() => {
        result.innerText = `كسبت: ${prize} 🎉\nكودك: ${code}`;

        localStorage.setItem("spun", "true");
        localStorage.setItem("discountCode", code);

        spinBtn.disabled = true;

        let message = `🔥 كسبت في عجلة الحظ!\n🎁 الجائزة: ${prize}\n🎟️ الكود: ${code}\nعايز أستخدمه في الطلب`;
        let url = whatsappLink + "?text=" + encodeURIComponent(message);

        setTimeout(() => {
            window.open(url, "_blank");
        }, 1000);

    }, 4000);
};

// ✨ الخلفية الفخمة
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
        if (p.y > canvas.height || p.y < 0) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 100) {
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
